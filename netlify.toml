[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "SB_URL"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options   = "nosniff"
    X-Frame-Options          = "DENY"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Content-Security-Policy  = "default-src 'self'; script-src 'self' https://www.clarity.ms 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.supabase.co; font-src 'self'; media-src 'self'; connect-src 'self' https://www.clarity.ms https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
